services:
  backend:
    image: vocalflow-studio-backend:prod
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      args:
        DOCKER_HUB_PREFIX: ${DOCKER_HUB_PREFIX:-docker.m.daocloud.io/library}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ../.env
    environment:
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    volumes:
      - ./secrets:/app/backend/secrets:ro
      - novel_uploads:/app/backend/uploads/novels
    depends_on:
      - qdrant
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  frontend:
    image: vocalflow-studio-frontend:prod
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        DOCKER_HUB_PREFIX: ${DOCKER_HUB_PREFIX:-docker.m.daocloud.io/library}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./prod/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./prod/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  qdrant:
    image: ${QDRANT_IMAGE:-${DOCKER_HUB_PREFIX:-docker.m.daocloud.io}/qdrant/qdrant:latest}
    restart: unless-stopped
    ports:
      # 单机部署保持 127.0.0.1；若 ecs-b 需要访问，将 QDRANT_BIND_HOST 设为 ecs-a 内网 IP 或 0.0.0.0，
      # 并在安全组中仅允许 ecs-b 内网 IP 访问 6333/6334。
      - "${QDRANT_BIND_HOST:-127.0.0.1}:6333:6333"
      - "${QDRANT_BIND_HOST:-127.0.0.1}:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  novel_uploads:
  qdrant_data:
