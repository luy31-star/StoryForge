# 默认 DaoCloud Hub 镜像；海外时在项目根 .env 设 DOCKER_HUB_PREFIX=docker.io/library

services:
  frontend:
    image: ${DOCKER_HUB_PREFIX:-docker.m.daocloud.io/library}/node:20-alpine
    working_dir: /app
    volumes:
      - ../frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE=
    depends_on:
      - backend

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      args:
        DOCKER_HUB_PREFIX: ${DOCKER_HUB_PREFIX:-docker.m.daocloud.io/library}
    image: vocalflow-studio-backend-dev
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://user:password@mysql:3306/vocalflow
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=http://localhost:3000
    env_file:
      - ../.env
    volumes:
      - ../backend/uploads/novels:/app/backend/uploads/novels
      - ./secrets:/app/backend/secrets:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    image: vocalflow-studio-backend-dev
    working_dir: /app/backend
    command: celery -A app.tasks.celery_app worker -l info -Q vocalflow
    environment:
      - DATABASE_URL=mysql+pymysql://user:password@mysql:3306/vocalflow
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ../.env
    volumes:
      - ../backend/uploads/novels:/app/backend/uploads/novels
      - ./secrets:/app/backend/secrets:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  celery-beat:
    image: vocalflow-studio-backend-dev
    working_dir: /app/backend
    command: celery -A app.tasks.celery_app beat -l info
    environment:
      - DATABASE_URL=mysql+pymysql://user:password@mysql:3306/vocalflow
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ../.env
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ./secrets:/app/backend/secrets:ro

  mysql:
    image: ${DOCKER_HUB_PREFIX:-docker.m.daocloud.io/library}/mysql:8
    environment:
      MYSQL_DATABASE: vocalflow
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "user", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: ${DOCKER_HUB_PREFIX:-docker.m.daocloud.io/library}/redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mysqldata:
