services:
  backend:
    image: vocalflow-studio-backend:prod
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      args:
        DOCKER_HUB_PREFIX: ${DOCKER_HUB_PREFIX:-docker.m.daocloud.io/library}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ../.env
    volumes:
      - ./secrets:/app/backend/secrets:ro
      - novel_uploads:/app/backend/uploads/novels
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  frontend:
    image: vocalflow-studio-frontend:prod
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        DOCKER_HUB_PREFIX: ${DOCKER_HUB_PREFIX:-docker.m.daocloud.io/library}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./prod/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./prod/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  novel_uploads:
